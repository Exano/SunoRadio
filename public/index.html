<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SunoTime Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* --- Blurred background album art --- */
    #bg-art {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 120%;
      height: 120%;
      background-size: cover;
      background-position: center;
      filter: blur(40px);
      opacity: 0;
      transform: scale(1.2);
      transition: opacity 0.15s ease;
      z-index: 0;
      pointer-events: none;
    }
    #bg-art.visible { opacity: 0.15; }

    /* --- Top bar --- */
    .top-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(13, 13, 20, 0.85);
      border-bottom: 1px solid #1a1a25;
      min-height: 40px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-freq {
      font-size: 20px;
      font-weight: 800;
      color: #ff4f00;
      font-variant-numeric: tabular-nums;
    }

    .top-freq-unit {
      font-size: 12px;
      font-weight: 400;
      color: #ff4f00;
      opacity: 0.6;
    }

    .top-dot {
      color: #333;
      font-size: 10px;
    }

    .top-station-name {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      transition: opacity 0.3s;
    }
    .top-station-name.hidden { opacity: 0; }

    .on-air {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ff4f00;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .on-air.visible { opacity: 1; }

    .on-air-dot {
      width: 7px;
      height: 7px;
      background: #ff4f00;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* --- Tuner Panel (dial) --- */
    .tuner-panel {
      position: relative;
      z-index: 2;
      background: rgba(13, 13, 20, 0.85);
      border-bottom: 1px solid #1a1a25;
      padding: 8px 20px 6px;
      user-select: none;
    }

    .dial-band-wrapper {
      position: relative;
      height: 56px;
      margin: 0 -20px;
    }

    .dial-canvas {
      display: block;
      width: 100%;
      height: 56px;
    }

    .tuner-needle {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: #ff4f00;
      box-shadow: 0 0 8px rgba(255, 79, 0, 0.6);
      pointer-events: none;
      z-index: 5;
      transform: translateX(-1px);
      transition: left 0.05s linear;
    }

    #tuner-range {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      outline: none;
      cursor: grab;
      z-index: 10;
      margin: 0;
      opacity: 0;
    }

    .signal-meter {
      text-align: center;
      font-size: 10px;
      color: #333;
      letter-spacing: 1px;
      height: 14px;
      margin-top: 2px;
    }

    /* --- Main Display (visualizer area) --- */
    .radio-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      min-height: 0;
      transition: opacity 0.3s;
    }

    #visualizer {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Overlay states centered on visualizer */
    .overlay-state {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }

    .tuning-text {
      color: #555;
      font-size: 13px;
      letter-spacing: 1px;
    }
    .tuning-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #222;
      border-top-color: #ff4f00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .between-stations-text {
      color: #333;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .pick-station-icon {
      font-size: 40px;
      margin-bottom: 8px;
      opacity: 0.3;
    }
    .pick-station-text {
      color: #555;
      font-size: 15px;
      letter-spacing: 0.5px;
    }
    .pick-station-sub {
      color: #333;
      font-size: 12px;
      margin-top: 4px;
    }

    /* --- Bottom bar --- */
    .bottom-bar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: rgba(13, 13, 20, 0.9);
      border-top: 1px solid #1a1a25;
      min-height: 48px;
      gap: 12px;
    }

    .bottom-song-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
    }

    .bottom-note {
      color: #ff4f00;
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .bottom-note.visible { opacity: 1; }

    .bottom-song-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bottom-title {
      font-size: 14px;
      font-weight: 600;
      color: #e0e0e0;
    }

    .bottom-sep {
      color: #444;
      margin: 0 4px;
      font-weight: 300;
    }

    .bottom-artist {
      font-size: 14px;
      color: #888;
    }

    .volume-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .vol-icon {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .vol-icon:hover { color: #fff; }
    .vol-icon svg { width: 18px; height: 18px; fill: currentColor; }

    .volume-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 70px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: #ff4f00;
      border-radius: 50%;
      cursor: pointer;
    }

    /* --- Twitch Chat Integration --- */
    .chat-toggle {
      display: none;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid #333;
      border-radius: 4px;
      color: #666;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: color 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }
    .chat-toggle:hover { color: #aaa; border-color: #555; }
    .chat-toggle.active { color: #9146ff; border-color: #9146ff; }
    .chat-toggle svg { width: 16px; height: 16px; fill: currentColor; }
    .chat-toggle .chat-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .chat-toggle .chat-status-dot.connected { background: #00c853; }
    .chat-toggle .chat-status-dot.connecting { background: #ff9800; }
    .chat-toggle .chat-status-dot.error { background: #f44336; }

    .chat-sidebar {
      position: absolute;
      top: 0; right: 0;
      width: 300px; height: 100%;
      background: rgba(10, 10, 18, 0.88);
      border-left: 1px solid #1a1a25;
      z-index: 3;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow: hidden;
    }
    .chat-sidebar.visible { transform: translateX(0); }
    .chat-sidebar-header {
      padding: 8px 12px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #9146ff;
      border-bottom: 1px solid #1a1a25;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .chat-sidebar-header .chat-channel-name {
      color: #666;
      font-weight: 400;
      letter-spacing: 1px;
    }
    .chat-sidebar-messages {
      flex: 1;
      overflow-y: auto;
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .chat-sidebar-messages::-webkit-scrollbar { width: 4px; }
    .chat-sidebar-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-sidebar-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .chat-msg {
      font-size: 12px;
      line-height: 1.4;
      animation: chatFadeIn 0.2s ease;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .chat-msg .chat-user { font-weight: 700; margin-right: 4px; }
    .chat-msg .chat-text { color: #ccc; }
    @keyframes chatFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-ticker {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 32px;
      background: rgba(10, 10, 18, 0.85);
      border-top: 1px solid #1a1a25;
      z-index: 3;
      overflow: hidden;
      display: none;
      align-items: center;
    }
    .chat-ticker.visible { display: flex; }
    .chat-ticker-track {
      display: flex;
      align-items: center;
      white-space: nowrap;
      padding-left: 100%;
      animation: tickerScroll 30s linear infinite;
    }
    .chat-ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-right: 40px;
      font-size: 12px;
      flex-shrink: 0;
    }
    .chat-ticker-item .chat-user { font-weight: 700; }
    .chat-ticker-item .chat-text { color: #ccc; }
    .chat-ticker-item .ticker-sep {
      color: #333;
      margin: 0 8px;
      font-size: 8px;
    }
    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }
    /* --- Dev Menu --- */
    .dev-menu {
      position: fixed;
      bottom: 52px;
      left: 12px;
      z-index: 100;
      background: rgba(10, 10, 18, 0.92);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      display: none;
      flex-direction: column;
      gap: 6px;
      font-size: 11px;
      max-width: 200px;
      backdrop-filter: blur(8px);
    }
    .dev-menu.visible { display: flex; }
    .dev-menu-title {
      color: #ff4f00;
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .dev-menu-section {
      color: #666;
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .dev-menu button {
      background: rgba(255, 255, 255, 0.06);
      color: #ccc;
      border: 1px solid #2a2a35;
      border-radius: 4px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
    }
    .dev-menu button:hover {
      background: rgba(255, 79, 0, 0.15);
      border-color: #ff4f00;
      color: #fff;
    }
    .dev-menu button.active-fx {
      border-color: #ff4f00;
      color: #ff4f00;
    }
    .dev-menu-row {
      display: flex;
      gap: 4px;
    }
    .dev-menu-row button { flex: 1; }
  </style>
</head>
<body>

  <!-- Blurred background album art -->
  <div id="bg-art"></div>

  <!-- Compact top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-freq" id="top-freq">98.1</span><span class="top-freq-unit">FM</span>
      <span class="top-dot">&middot;</span>
      <span class="top-station-name hidden" id="top-station-name"></span>
    </div>
    <div class="on-air" id="on-air">
      <span>ON AIR</span>
      <span class="on-air-dot"></span>
    </div>
  </div>

  <!-- Tuner dial -->
  <div class="tuner-panel" id="tuner-panel">
    <div class="dial-band-wrapper" id="dial-band-wrapper">
      <canvas class="dial-canvas" id="dial-canvas"></canvas>
      <div class="tuner-needle" id="tuner-needle"></div>
      <input type="range" id="tuner-range" min="881" max="1079" step="2" value="981">
    </div>
    <div class="signal-meter" id="signal-meter"></div>
  </div>

  <!-- Main display: visualizer + overlay states -->
  <div class="radio-display" id="display">
    <canvas id="visualizer"></canvas>
    <div class="overlay-state" id="overlay">
      <div class="pick-station-icon">&#9685;</div>
      <div class="pick-station-text">Tune the dial to find a station</div>
      <div class="pick-station-sub">Drag the slider or use arrow keys</div>
    </div>
    <div class="chat-sidebar" id="chat-sidebar">
      <div class="chat-sidebar-header">
        TWITCH CHAT <span class="chat-channel-name" id="chat-channel-name"></span>
      </div>
      <div class="chat-sidebar-messages" id="chat-messages"></div>
    </div>
    <div class="chat-ticker" id="chat-ticker">
      <div class="chat-ticker-track" id="chat-ticker-track"></div>
    </div>
  </div>

  <!-- Compact bottom bar -->
  <div class="bottom-bar" id="bottom-bar">
    <div class="bottom-song-info">
      <span class="bottom-note" id="bottom-note">&#9835;</span>
      <span class="bottom-song-text" id="bottom-song-text"></span>
    </div>
    <button class="chat-toggle" id="chat-toggle" title="Toggle Twitch chat">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
      <span class="chat-status-dot" id="chat-status-dot"></span>
      <span class="chat-mode-label" id="chat-mode-label"></span>
    </button>
    <div class="volume-controls">
      <button class="vol-icon" id="vol-btn">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </button>
      <input type="range" class="volume-slider" id="vol-slider" min="0" max="1" step="0.01">
    </div>
  </div>

  <!-- Dev menu for testing effects (Ctrl+Shift+D to toggle) -->
  <div class="dev-menu" id="dev-menu">
    <div class="dev-menu-title">FX Dev Menu</div>
    <div class="dev-menu-section">Mode</div>
    <div class="dev-menu-row">
      <button data-fx="bars">Bars</button>
      <button data-fx="scope">Scope</button>
    </div>
    <div class="dev-menu-row">
      <button data-fx="circle">Circle</button>
      <button data-fx="blocks">Blocks</button>
    </div>
    <div class="dev-menu-section">Visualizer (30s)</div>
    <div class="dev-menu-row">
      <button data-fx="disco">Disco</button>
      <button data-fx="matrix">Matrix</button>
    </div>
    <div class="dev-menu-row">
      <button data-fx="vaporwave">Vaporwave</button>
      <button data-fx="party">Party</button>
    </div>
    <div class="dev-menu-row">
      <button data-fx="chill">Chill</button>
      <button data-fx="rain">Rain</button>
    </div>
    <div class="dev-menu-section">Overlays</div>
    <div class="dev-menu-row">
      <button data-fx="discoball">Disco Ball</button>
      <button data-fx="confetti">Confetti</button>
    </div>
    <div class="dev-menu-row">
      <button data-fx="fire">Fire</button>
      <button data-fx="snow">Snow</button>
    </div>
    <div class="dev-menu-row">
      <button data-fx="earthquake">Quake</button>
    </div>
    <div class="dev-menu-section">Station</div>
    <div class="dev-menu-row">
      <button data-fx="previouschannel">Prev</button>
      <button data-fx="nextchannel">Next</button>
    </div>
    <button data-fx="reset">Reset</button>
  </div>

  <script>
    // ---- Constants ----
    const RECEPTION_RANGE = 0.5;  // MHz — how far from center a station is audible
    const DISPLAY_RANGE = 0.2;    // MHz — show station info within this distance
    const POOL_SIZE = 4;          // Max simultaneous audio channels
    const FREQ_MIN = 88.1;
    const FREQ_MAX = 107.9;
    const FREQ_SPAN = FREQ_MAX - FREQ_MIN;  // 19.8

    const PLACEHOLDER = "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%231a1a24%22 width=%221%22 height=%221%22/></svg>";

    // ---- Volume Persistence ----
    function getSavedVolume() {
      try {
        const v = parseFloat(localStorage.getItem("sunotime-volume"));
        if (!isNaN(v) && v >= 0 && v <= 1) return v;
      } catch (e) {}
      return 0.7;
    }
    function saveVolume(val) {
      try { localStorage.setItem("sunotime-volume", String(val)); } catch (e) {}
    }
    // Attempt perceptual loudness: x^2 curve so low-end has more control
    function volumeCurve(val) {
      return val * val;
    }

    // ---- User Color Persistence ----
    function getUserColor() {
      try {
        var c = localStorage.getItem("sunotime-user-color");
        if (c) return c;
      } catch (e) {}
      // Generate random bright HSL color
      var hue = Math.floor(Math.random() * 360);
      var color = "hsl(" + hue + ", 90%, 60%)";
      try { localStorage.setItem("sunotime-user-color", color); } catch (e) {}
      return color;
    }
    var userColor = getUserColor();

    // ---- State ----
    // var (not let) so tests can access via window.*
    var stations = [];
    var stationData = {};        // freq → { songs, ... }
    var currentFreq = 98.1;
    var displayedStationFreq = null;
    var displayedSongId = null;
    var started = false;         // Has user interacted yet?
    var preloadedImages = {};    // url → Image, prevents GC + deduplicates

    // ---- Visualizer Effects State ----
    var visualizerFx = {
      colorMode: 'default',   // 'default','disco','matrix','vaporwave','chill'
      intensity: 1.0,         // bar height multiplier
      glowMultiplier: 1.0,    // shadowBlur multiplier
      rain: false,            // flip bar direction (top-down)
      hueOffset: 0,           // for disco rotation (incremented per frame)
      timer: null,            // setTimeout id for auto-expire
      mode: 'bars'            // 'bars' | 'scope' | 'circle' | 'blocks'
    };

    var overlayEffects = [];  // active overlay animations

    function addOverlay(id, duration, initFn) {
      for (var i = overlayEffects.length - 1; i >= 0; i--) {
        if (overlayEffects[i].id === id) overlayEffects.splice(i, 1);
      }
      var ov = { id: id, startTime: Date.now(), duration: duration };
      initFn(ov);
      overlayEffects.push(ov);
    }

    function createDiscoBall() {
      addOverlay('discoball', 8, function(ov) {
        ov.ballY = -0.05;
        ov.ballAngle = 0;
        ov.dots = [];
        for (var i = 0; i < 30; i++) {
          ov.dots.push({
            x: Math.random(), y: Math.random(),
            size: 2 + Math.random() * 4,
            speed: 0.2 + Math.random() * 0.5,
            phase: Math.random() * Math.PI * 2,
            alpha: Math.random()
          });
        }
        ov.update = function(dt, elapsed) {
          ov.ballAngle += dt * 2;
          if (elapsed < 0.5) {
            ov.ballY = -0.05 + 0.23 * (elapsed / 0.5);
          } else {
            ov.ballY = 0.18;
          }
          for (var i = 0; i < ov.dots.length; i++) {
            var d = ov.dots[i];
            d.phase += dt * d.speed * 3;
            d.x += Math.sin(d.phase) * 0.003;
            d.y += Math.cos(d.phase * 0.7) * 0.002;
            if (d.x < 0) d.x += 1; if (d.x > 1) d.x -= 1;
            if (d.y < 0) d.y += 1; if (d.y > 1) d.y -= 1;
            d.alpha = 0.3 + 0.7 * Math.abs(Math.sin(d.phase));
          }
        };
        ov.render = function(ctx, w, h) {
          var elapsed = (Date.now() - ov.startTime) / 1000;
          var fade = elapsed > ov.duration - 1 ? ov.duration - elapsed : 1;
          var bx = w / 2, by = ov.ballY * h;
          var radius = Math.min(w, h) * 0.06;
          ctx.save();
          ctx.globalAlpha = fade;
          ctx.strokeStyle = '#888';
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, by); ctx.stroke();
          var grad = ctx.createRadialGradient(bx - radius * 0.3, by - radius * 0.3, radius * 0.1, bx, by, radius);
          grad.addColorStop(0, 'rgba(220,220,240,0.9)');
          grad.addColorStop(0.5, 'rgba(180,180,200,0.7)');
          grad.addColorStop(1, 'rgba(100,100,120,0.5)');
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.arc(bx, by, radius, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.3)';
          ctx.lineWidth = 0.5;
          for (var r = -2; r <= 2; r++) {
            var ly = by + r * radius * 0.35;
            var halfW = Math.sqrt(Math.max(0, radius * radius - (ly - by) * (ly - by)));
            ctx.beginPath(); ctx.moveTo(bx - halfW, ly); ctx.lineTo(bx + halfW, ly); ctx.stroke();
          }
          for (var a = 0; a < 6; a++) {
            var angle = ov.ballAngle + a * Math.PI / 3;
            var lx = bx + Math.sin(angle) * radius;

          }
          for (var i = 0; i < ov.dots.length; i++) {
            var d = ov.dots[i];
            ctx.globalAlpha = d.alpha * fade;
            var hue = (i * 37 + Date.now() * 0.1) % 360;
            ctx.fillStyle = 'hsl(' + hue + ', 80%, 75%)';
            ctx.beginPath(); ctx.arc(d.x * w, d.y * h, d.size, 0, Math.PI * 2); ctx.fill();
          }
          ctx.restore();
        };
      });
    }

    // ---- Presence State ----
    var otherUsers = {};         // id → { freq, color }
    var wsConn = null;
    var myUserId = null;
    var dialRedrawScheduled = false;

    // ---- Web Audio Engine ----
    var audioCtx = null;
    var masterGain = null;
    var analyserNode = null;
    var channelPool = [];        // { audio, source, gainNode, stationFreq, songs, songIndex }

    function initAudioEngine() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      masterGain = audioCtx.createGain();
      masterGain.gain.value = volumeCurve(getSavedVolume());

      analyserNode = audioCtx.createAnalyser();
      analyserNode.fftSize = 256;
      analyserNode.smoothingTimeConstant = 0.8;

      masterGain.connect(analyserNode);
      analyserNode.connect(audioCtx.destination);

      // Create channel pool — each with its own Audio element + gain node
      for (let i = 0; i < POOL_SIZE; i++) {
        const audio = new Audio();
        audio.crossOrigin = "anonymous";
        audio.volume = 1.0;

        const source = audioCtx.createMediaElementSource(audio);
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = 0;
        source.connect(gainNode);
        gainNode.connect(masterGain);

        const ch = {
          audio,
          source,
          gainNode,
          stationFreq: null,
          songs: null,
          songIndex: -1,
        };

        // When a song ends, advance to next in that channel's playlist
        audio.addEventListener("ended", () => {
          if (!ch.stationFreq || !ch.songs) return;
          const len = ch.songs.length;
          const next = (ch.songIndex + 1) % len;
          ch.songIndex = next;
          const song = ch.songs[next];
          ch.audio.src = song.audioUrl;
          ch.audio.play().catch(() => {});
          // Preload the song after next so its art is ready
          preloadImage(ch.songs[(next + 1) % len].imageUrl);
          updateDisplayIfNeeded();
        });

        channelPool.push(ch);
      }
    }

    function ensureAudio() {
      if (!audioCtx) initAudioEngine();
      if (audioCtx.state === "suspended") audioCtx.resume();
      if (!started) {
        started = true;
        updateChannels();
      }
    }

    // ---- UTC Schedule ----
    function getSchedule(songs) {
      const totalDuration = songs.reduce((sum, s) => sum + (Number(s.duration) || 0), 0);
      if (!totalDuration || isNaN(totalDuration)) return { index: 0, elapsed: 0 };
      const offset = (Date.now() / 1000) % totalDuration;

      let cumulative = 0;
      for (let i = 0; i < songs.length; i++) {
        if (cumulative + songs[i].duration > offset) {
          return { index: i, elapsed: offset - cumulative };
        }
        cumulative += songs[i].duration;
      }
      return { index: 0, elapsed: 0 };
    }

    // ---- Channel Management ----
    // On every frequency change, figure out which stations are in range,
    // assign audio channels to them, and set gains via cosine crossfade.

    function updateChannels() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;

      // 1. Find all stations within reception range that have data
      const inRange = [];
      for (const s of stations) {
        const dist = Math.abs(currentFreq - parseFloat(s.freq));
        if (dist < RECEPTION_RANGE) {
          const data = stationData[s.freq];
          if (data?.songs?.length > 0) {
            inRange.push({ station: s, dist, data });
          }
        }
      }

      const inRangeFreqs = new Set(inRange.map(r => r.station.freq));

      // 2. Release channels whose stations went out of range
      for (const ch of channelPool) {
        if (ch.stationFreq && !inRangeFreqs.has(ch.stationFreq)) {
          ch.gainNode.gain.setTargetAtTime(0, now, 0.015);
          ch.audio.pause();
          ch.stationFreq = null;
          ch.songs = null;
          ch.songIndex = -1;
        }
      }

      // 3. For each in-range station, ensure it has a channel & update gain
      for (const { station, dist, data } of inRange) {
        let ch = channelPool.find(c => c.stationFreq === station.freq);

        if (!ch) {
          // Assign a free channel
          ch = channelPool.find(c => c.stationFreq === null);
          if (!ch) continue; // Pool exhausted

          const { index, elapsed } = getSchedule(data.songs);
          ch.stationFreq = station.freq;
          ch.songs = data.songs;
          ch.songIndex = index;

          const song = data.songs[index];
          const seekTarget = elapsed;
          const assignedFreq = station.freq;

          ch.audio.src = song.audioUrl;

          let didPlay = false;
          if (seekTarget > 0.5) {
            // Wait for metadata → seek → wait for seek to finish → play.
            // CRITICAL: register "seeked" INSIDE "loadedmetadata" AFTER
            // setting currentTime, so we catch OUR seek, not the browser's
            // initial-load seek-to-0.
            ch.audio.addEventListener("loadedmetadata", () => {
              if (didPlay || ch.stationFreq !== assignedFreq) return;
              ch.audio.currentTime = seekTarget;
              ch.audio.addEventListener("seeked", () => {
                if (didPlay || ch.stationFreq !== assignedFreq) return;
                didPlay = true;
                ch.audio.play().catch(() => {});
              }, { once: true });
            }, { once: true });
            // Fallback: if seeked never fires (non-seekable source), play after 4s
            setTimeout(() => {
              if (didPlay || ch.stationFreq !== assignedFreq) return;
              didPlay = true;
              ch.audio.play().catch(() => {});
            }, 4000);
          } else {
            // Near the start of the song, just play from 0
            ch.audio.addEventListener("canplay", () => {
              if (didPlay || ch.stationFreq !== assignedFreq) return;
              didPlay = true;
              ch.audio.play().catch(() => {});
            }, { once: true });
          }
        }

        // Cosine crossfade gain based on distance
        const t = dist / RECEPTION_RANGE;
        const gain = Math.cos(t * Math.PI / 2);
        ch.gainNode.gain.setTargetAtTime(gain, now, 0.02);
      }

      // 4. If nothing in range, all channels are silent (already handled by release)
    }

    // ---- Display ----

    var visualizerRunning = false;

    function updateDisplayIfNeeded() {
      // Find nearest station within display range
      let nearest = null;
      let minDist = Infinity;
      for (const s of stations) {
        const d = Math.abs(currentFreq - parseFloat(s.freq));
        if (d < minDist) { minDist = d; nearest = s; }
      }

      const stationNameEl = document.getElementById("top-station-name");
      const onAirEl = document.getElementById("on-air");

      if (nearest && minDist < DISPLAY_RANGE) {
        stationNameEl.textContent = nearest.name;
        stationNameEl.classList.remove("hidden");
        onAirEl.classList.add("visible");

        // Find the channel playing this station
        const ch = channelPool.find(c => c.stationFreq === nearest.freq);
        const song = ch?.songs?.[ch.songIndex];
        const songId = song?.id;

        if (song && (nearest.freq !== displayedStationFreq || songId !== displayedSongId)) {
          displayedStationFreq = nearest.freq;
          displayedSongId = songId;
          renderNowPlaying(song, nearest);
        }

        // Hide overlay when tuned to a station
        document.getElementById("overlay").style.display = "none";

        // Start visualizer
        if (!visualizerRunning) startVisualizer();
      } else {
        stationNameEl.classList.add("hidden");
        onAirEl.classList.remove("visible");

        if (displayedStationFreq !== null) {
          displayedStationFreq = null;
          displayedSongId = null;
          renderBetweenStations();
        }
      }

      // Signal meter
      updateSignalMeter(nearest, minDist);
    }

    function updateSignalMeter(nearest, dist) {
      const el = document.getElementById("signal-meter");
      if (!started) { el.textContent = ""; return; }

      if (dist < 0.05) {
        el.textContent = "";
      } else if (dist < DISPLAY_RANGE) {
        const bars = Math.max(1, Math.round((1 - dist / DISPLAY_RANGE) * 5));
        el.textContent = "\u2581\u2582\u2583\u2585\u2587".slice(0, bars);
        el.style.color = "#555";
      } else if (dist < RECEPTION_RANGE) {
        el.textContent = "\u2581";
        el.style.color = "#333";
      } else {
        el.textContent = "";
      }
    }

    function renderNowPlaying(song, station) {
      // Update bottom bar song info
      const songText = document.getElementById("bottom-song-text");
      songText.innerHTML = `<span class="bottom-title" data-testid="song-title">${esc(song.title)}</span><span class="bottom-sep">&mdash;</span><span class="bottom-artist" data-testid="song-artist">${esc(song.artist)}</span>`;
      document.getElementById("bottom-note").classList.add("visible");

      // Update background art
      const bgArt = document.getElementById("bg-art");
      bgArt.style.backgroundImage = `url(${song.imageUrl})`;
      bgArt.classList.add("visible");
    }

    function renderBetweenStations() {
      // Clear bottom bar song info
      document.getElementById("bottom-song-text").innerHTML = "";
      document.getElementById("bottom-note").classList.remove("visible");

      // Show between-stations overlay
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex";
      overlay.innerHTML = `<div class="between-stations-text">Between stations</div>`;

      // Fade background
      document.getElementById("bg-art").classList.remove("visible");
    }

    function renderLoading() {
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex";
      overlay.innerHTML = `
        <div class="tuning-text">LOADING STATIONS</div>
        <div class="tuning-spinner"></div>
      `;
    }

    // ---- Visualizer ----

    function startVisualizer() {
      if (visualizerRunning) return;
      visualizerRunning = true;

      const canvas = document.getElementById("visualizer");
      const ctx = canvas.getContext("2d");
      const bgArt = document.getElementById("bg-art");

      // Peak hold state — one per mirrored bar index
      let peaks = null;
      let peakVel = null;
      const PEAK_HOLD = 18;
      const PEAK_GRAVITY = 0.0012;
      let peakHold = null;
      var lastFrameTime = Date.now();

      function getBarColor(val, index, total) {
        var cm = visualizerFx.colorMode;
        var edgeFade = Math.min(1, (index / total) * 4, ((total - 1 - index) / total) * 4);
        var alpha = (val * 0.85 + 0.08) * edgeFade;
        var color, glowColor, peakColor;
        if (cm === 'disco') {
          var hue = (visualizerFx.hueOffset + index * 3) % 360;
          color = 'hsla(' + hue + ', 85%, 55%, ' + alpha + ')';
          glowColor = 'hsla(' + hue + ', 85%, 55%, ' + (alpha * 0.6) + ')';
          peakColor = 'hsla(' + ((hue + 30) % 360) + ', 80%, 70%, ';
        } else if (cm === 'matrix') {
          var gr = Math.round(160 + val * 95);
          var bl = Math.round(val * 65);
          color = 'rgba(0, ' + gr + ', ' + bl + ', ' + alpha + ')';
          glowColor = 'rgba(0, 255, 65, ' + (alpha * 0.6) + ')';
          peakColor = 'rgba(0, 255, 100, ';
        } else if (cm === 'vaporwave') {
          var t = index / Math.max(1, total - 1);
          var r = Math.round(255 * (1 - t));
          var g = Math.round(50 + (220 - 50) * t);
          var b = Math.round(200 + (255 - 200) * t);
          color = 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
          glowColor = 'rgba(180, 0, 255, ' + (alpha * 0.6) + ')';
          peakColor = 'rgba(200, 100, 255, ';
        } else if (cm === 'chill') {
          var rc = Math.round(80 + val * 80);
          var gc = Math.round(130 + val * 60);
          color = 'rgba(' + rc + ', ' + gc + ', 255, ' + alpha + ')';
          glowColor = 'rgba(80, 130, 255, ' + (alpha * 0.6) + ')';
          peakColor = 'rgba(150, 200, 255, ';
        } else {
          var rd = 255;
          var gd = Math.round(79 + (200 - 79) * (1 - val));
          var bd = Math.round(val > 0.8 ? (val - 0.8) * 5 * 60 : 0);
          color = 'rgba(' + rd + ', ' + gd + ', ' + bd + ', ' + alpha + ')';
          glowColor = 'rgba(255, 79, 0, ' + (alpha * 0.6) + ')';
          peakColor = 'rgba(255, 200, 80, ';
        }
        return { color: color, glowColor: glowColor, peakColor: peakColor, alpha: alpha, edgeFade: edgeFade };
      }

      function getStrokeColor(val) {
        var cm = visualizerFx.colorMode;
        if (cm === 'disco') return 'hsl(' + visualizerFx.hueOffset + ', 85%, 55%)';
        if (cm === 'matrix') return 'rgb(0, ' + Math.round(160 + val * 95) + ', ' + Math.round(val * 65) + ')';
        if (cm === 'vaporwave') return 'rgb(200, 100, 255)';
        if (cm === 'chill') return 'rgb(100, 160, 255)';
        return 'rgb(255, ' + Math.round(79 + (200 - 79) * (1 - val)) + ', 0)';
      }

      function drawBars(data, w, h) {
        var half = Math.floor(data.length / 2);
        var totalBars = half * 2;
        var gap = 1.5;
        var barWidth = Math.max(2, w / totalBars - gap);
        var step = w / totalBars;
        var maxBarHeight = h * 0.92;

        if (!peaks || peaks.length !== half) {
          peaks = new Float32Array(half);
          peakVel = new Float32Array(half);
          peakHold = new Uint16Array(half);
        }

        ctx.save();
        ctx.shadowBlur = 12 * visualizerFx.glowMultiplier;

        for (var i = 0; i < half; i++) {
          var val = data[i] / 255;
          var barH = val * maxBarHeight * visualizerFx.intensity;
          var bc = getBarColor(val, i, half);

          ctx.fillStyle = bc.color;
          ctx.shadowColor = bc.glowColor;

          var xRight = w / 2 + i * step;
          var xLeft = w / 2 - (i + 1) * step;

          if (visualizerFx.rain) {
            ctx.fillRect(xRight, 0, barWidth, barH);
            ctx.fillRect(xLeft, 0, barWidth, barH);
          } else {
            ctx.fillRect(xRight, h - barH, barWidth, barH);
            ctx.fillRect(xLeft, h - barH, barWidth, barH);
          }

          if (val >= peaks[i]) {
            peaks[i] = val;
            peakVel[i] = 0;
            peakHold[i] = PEAK_HOLD;
          } else {
            if (peakHold[i] > 0) {
              peakHold[i]--;
            } else {
              peakVel[i] += PEAK_GRAVITY;
              peaks[i] -= peakVel[i];
              if (peaks[i] < 0) peaks[i] = 0;
            }
          }

          var peakAlpha = bc.edgeFade * (0.5 + peaks[i] * 0.5);
          ctx.shadowColor = 'transparent';
          ctx.fillStyle = bc.peakColor + peakAlpha + ')';
          if (visualizerFx.rain) {
            var peakY = peaks[i] * maxBarHeight * visualizerFx.intensity;
            ctx.fillRect(xRight, peakY, barWidth, 2);
            ctx.fillRect(xLeft, peakY, barWidth, 2);
          } else {
            var peakY2 = h - peaks[i] * maxBarHeight * visualizerFx.intensity;
            ctx.fillRect(xRight, peakY2 - 2, barWidth, 2);
            ctx.fillRect(xLeft, peakY2 - 2, barWidth, 2);
          }
          ctx.shadowColor = bc.glowColor;
        }

        ctx.restore();
      }

      function drawScope(w, h) {
        var timeData = new Uint8Array(analyserNode.frequencyBinCount);
        analyserNode.getByteTimeDomainData(timeData);

        var avgVal = 0;
        for (var j = 0; j < timeData.length; j++) avgVal += Math.abs(timeData[j] - 128) / 128;
        avgVal /= timeData.length;

        ctx.save();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = getStrokeColor(avgVal);
        ctx.shadowBlur = 15 * visualizerFx.glowMultiplier;
        ctx.shadowColor = ctx.strokeStyle;

        ctx.beginPath();
        var sliceWidth = w / timeData.length;
        for (var i = 0; i < timeData.length; i++) {
          var v = (timeData[i] - 128) / 128;
          var y = (h / 2) + v * (h / 2) * 0.8 * visualizerFx.intensity;
          if (i === 0) ctx.moveTo(0, y);
          else ctx.lineTo(i * sliceWidth, y);
        }
        ctx.stroke();
        ctx.restore();
      }

      function drawCircle(data, w, h) {
        var half = Math.floor(data.length / 2);
        var cx = w / 2, cy = h / 2;
        var innerR = Math.min(w, h) * 0.15;
        var maxLen = Math.min(w, h) * 0.3;

        if (!peaks || peaks.length !== half) {
          peaks = new Float32Array(half);
          peakVel = new Float32Array(half);
          peakHold = new Uint16Array(half);
        }

        var lineW = Math.max(1.5, (2 * Math.PI * innerR) / half - 1);

        ctx.save();
        ctx.shadowBlur = 10 * visualizerFx.glowMultiplier;
        ctx.lineWidth = lineW;

        for (var i = 0; i < half; i++) {
          var val = data[i] / 255;
          var angle = (i / half) * Math.PI * 2 - Math.PI / 2;
          var barLen = val * maxLen * visualizerFx.intensity;
          var bc = getBarColor(val, i, half);

          var x1 = cx + Math.cos(angle) * innerR;
          var y1 = cy + Math.sin(angle) * innerR;
          var x2 = cx + Math.cos(angle) * (innerR + barLen);
          var y2 = cy + Math.sin(angle) * (innerR + barLen);

          ctx.strokeStyle = bc.color;
          ctx.shadowColor = bc.glowColor;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          if (val >= peaks[i]) {
            peaks[i] = val;
            peakVel[i] = 0;
            peakHold[i] = PEAK_HOLD;
          } else {
            if (peakHold[i] > 0) peakHold[i]--;
            else {
              peakVel[i] += PEAK_GRAVITY;
              peaks[i] -= peakVel[i];
              if (peaks[i] < 0) peaks[i] = 0;
            }
          }

          var peakDist = innerR + peaks[i] * maxLen * visualizerFx.intensity;
          var px = cx + Math.cos(angle) * peakDist;
          var py = cy + Math.sin(angle) * peakDist;
          var peakAlpha = bc.edgeFade * (0.5 + peaks[i] * 0.5);
          ctx.fillStyle = bc.peakColor + peakAlpha + ')';
          ctx.shadowColor = 'transparent';
          ctx.beginPath();
          ctx.arc(px, py, lineW * 0.6, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      function drawBlocks(data, w, h) {
        var cols = 16, rows = 12;
        var gapX = 2, gapY = 2;
        var cellW = (w - (cols + 1) * gapX) / cols;
        var cellH = (h - (rows + 1) * gapY) / rows;
        var binsPerCol = Math.floor(data.length / 2 / cols);

        ctx.save();
        for (var col = 0; col < cols; col++) {
          var sum = 0;
          var startBin = col * binsPerCol;
          for (var b = 0; b < binsPerCol; b++) sum += data[startBin + b];
          var avg = sum / (binsPerCol * 255);
          var filledRows = Math.round(avg * rows * visualizerFx.intensity);

          for (var row = 0; row < rows; row++) {
            var x = gapX + col * (cellW + gapX);
            var y = gapY + (rows - 1 - row) * (cellH + gapY);

            if (row < filledRows) {
              var bc = getBarColor(avg, col, cols);
              ctx.fillStyle = bc.color;
            } else {
              ctx.fillStyle = 'rgba(255,255,255,0.03)';
            }
            ctx.fillRect(x, y, cellW, cellH);
          }
        }
        ctx.restore();
      }

      function draw() {
        if (!visualizerRunning) return;
        requestAnimationFrame(draw);

        var now = Date.now();
        var dt = Math.min((now - lastFrameTime) / 1000, 0.05);
        lastFrameTime = now;

        const rect = canvas.parentElement.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const w = rect.width;
        const h = rect.height;

        if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + "px";
          canvas.style.height = h + "px";
        }

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        // Earthquake shake
        var quakeEffect = null;
        for (var qi = 0; qi < overlayEffects.length; qi++) {
          if (overlayEffects[qi].id === 'earthquake') { quakeEffect = overlayEffects[qi]; break; }
        }
        if (quakeEffect) {
          var qElapsed = (now - quakeEffect.startTime) / 1000;
          var qIntensity = Math.max(0, 1 - qElapsed / quakeEffect.duration);
          ctx.translate((Math.random() - 0.5) * 20 * qIntensity, (Math.random() - 0.5) * 20 * qIntensity);
        }

        ctx.clearRect(-20, -20, w + 40, h + 40);

        if (!analyserNode) return;

        const bufLen = analyserNode.frequencyBinCount;
        const data = new Uint8Array(bufLen);
        analyserNode.getByteFrequencyData(data);

        // Bass pulse
        let bassSum = 0;
        for (let bi = 0; bi < 6; bi++) bassSum += data[bi];
        const bassLevel = bassSum / (6 * 255);
        const bgOpacity = 0.10 + bassLevel * 0.20;
        bgArt.style.opacity = bgArt.classList.contains("visible") ? bgOpacity : 0;

        // Disco hue rotation
        if (visualizerFx.colorMode === 'disco') {
          visualizerFx.hueOffset = (visualizerFx.hueOffset + 2) % 360;
        }

        // Dispatch to mode renderer
        var mode = visualizerFx.mode;
        if (mode === 'scope') drawScope(w, h);
        else if (mode === 'circle') drawCircle(data, w, h);
        else if (mode === 'blocks') drawBlocks(data, w, h);
        else drawBars(data, w, h);

        // Glow line at base
        const grad = ctx.createLinearGradient(0, h - 3, 0, h);
        grad.addColorStop(0, `rgba(255, 79, 0, ${0.2 + bassLevel * 0.3})`);
        grad.addColorStop(1, "rgba(255, 79, 0, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, h - 3, w, 3);

        // Render overlays
        for (var oi = overlayEffects.length - 1; oi >= 0; oi--) {
          var ov = overlayEffects[oi];
          var ovElapsed = (now - ov.startTime) / 1000;
          if (ovElapsed >= ov.duration) {
            overlayEffects.splice(oi, 1);
            continue;
          }
          ov.update(dt, ovElapsed);
          ov.render(ctx, w, h, dt);
        }

        // Reset earthquake transform
        if (quakeEffect) {
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
      }

      draw();
    }

    // ---- Frequency Change ----

    function onFrequencyChange(newFreq) {
      currentFreq = newFreq;

      document.getElementById("top-freq").textContent = newFreq.toFixed(1);
      updateNeedlePosition();

      if (started) {
        updateChannels();
      }
      updateDisplayIfNeeded();
      sendTuneMessage(newFreq);
    }

    // ---- WebSocket Presence ----

    var lastTuneSent = 0;
    function sendTuneMessage(freq) {
      var now = Date.now();
      if (now - lastTuneSent < 100) return; // max 10/sec
      lastTuneSent = now;
      if (wsConn && wsConn.readyState === WebSocket.OPEN) {
        wsConn.send(JSON.stringify({ type: "tune", freq: freq }));
      }
    }

    function scheduleDialRedraw() {
      if (dialRedrawScheduled) return;
      dialRedrawScheduled = true;
      requestAnimationFrame(function() {
        dialRedrawScheduled = false;
        drawDial();
      });
    }

    function connectWebSocket() {
      var proto = location.protocol === "https:" ? "wss:" : "ws:";
      var url = proto + "//" + location.host;
      var ws = new WebSocket(url);

      ws.onopen = function() {
        wsConn = ws;
        ws.send(JSON.stringify({ type: "hello", color: userColor, freq: currentFreq }));
      };

      ws.onmessage = function(event) {
        var msg;
        try { msg = JSON.parse(event.data); } catch (e) { return; }

        if (msg.type === "welcome") {
          myUserId = msg.id;
          otherUsers = {};
          for (var i = 0; i < msg.users.length; i++) {
            var u = msg.users[i];
            otherUsers[u.id] = { freq: u.freq, color: u.color };
          }
          scheduleDialRedraw();
        } else if (msg.type === "user") {
          otherUsers[msg.id] = { freq: msg.freq, color: msg.color };
          scheduleDialRedraw();
        } else if (msg.type === "leave") {
          delete otherUsers[msg.id];
          scheduleDialRedraw();
        }
      };

      ws.onclose = function() {
        wsConn = null;
        otherUsers = {};
        scheduleDialRedraw();
        // Auto-reconnect after 3s
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = function() {
        ws.close();
      };
    }

    // ---- Dial Rendering ----

    function drawDial() {
      const wrapper = document.getElementById("dial-band-wrapper");
      const canvas = document.getElementById("dial-canvas");
      const width = wrapper.offsetWidth;
      const pxPerMHz = width / FREQ_SPAN;
      const dpr = window.devicePixelRatio || 1;

      canvas.width = width * dpr;
      canvas.height = 56 * dpr;
      canvas.style.width = width + "px";

      const ctx = canvas.getContext("2d");
      ctx.scale(dpr, dpr);

      // Tick marks
      for (let f = 88; f <= 108; f++) {
        const x = (f - FREQ_MIN) * pxPerMHz;

        ctx.strokeStyle = "#333";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, 36);
        ctx.lineTo(x, 56);
        ctx.stroke();

        ctx.fillStyle = "#444";
        ctx.font = "10px -apple-system, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(f.toString(), x, 32);

        for (let m = 0.2; m < 1; m += 0.2) {
          if (f + m > FREQ_MAX) break;
          const mx = (f + m - FREQ_MIN) * pxPerMHz;
          ctx.strokeStyle = "#222";
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(mx, 44);
          ctx.lineTo(mx, 56);
          ctx.stroke();
        }
      }

      // Station markers
      for (const s of stations) {
        const sf = parseFloat(s.freq);
        const x = (sf - FREQ_MIN) * pxPerMHz;

        ctx.fillStyle = "#ff4f00";
        ctx.beginPath();
        ctx.arc(x, 14, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#555";
        ctx.font = "8px -apple-system, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(s.name, x, 8);
      }

      // Other users' presence markers
      var height = 56;
      for (var uid in otherUsers) {
        var u = otherUsers[uid];
        var ux = (u.freq - FREQ_MIN) * pxPerMHz;
        if (ux < 0 || ux > width) continue;

        // Translucent colored line
        ctx.save();
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = u.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(ux, 0);
        ctx.lineTo(ux, height);
        ctx.stroke();

        // Small dot at top
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = u.color;
        ctx.beginPath();
        ctx.arc(ux, 4, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function updateNeedlePosition() {
      const wrapper = document.getElementById("dial-band-wrapper");
      const needle = document.getElementById("tuner-needle");
      const width = wrapper.offsetWidth;
      const x = ((currentFreq - FREQ_MIN) / FREQ_SPAN) * width;
      needle.style.left = x + "px";
    }

    // ---- Input Handling ----

    function setupTunerInput() {
      const slider = document.getElementById("tuner-range");

      slider.addEventListener("input", () => {
        ensureAudio();
        const freq = parseInt(slider.value, 10) / 10;
        onFrequencyChange(freq);
      });

      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" && e.target.id !== "tuner-range") return;
        if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
          e.preventDefault();
          ensureAudio();
          const step = e.key === "ArrowRight" ? 0.2 : -0.2;
          let newVal = currentFreq + step;
          newVal = Math.max(88.1, Math.min(107.9, newVal));
          newVal = Math.round(newVal * 10) / 10;
          if (Math.round(newVal * 10) % 2 === 0) {
            newVal += (step > 0 ? 0.1 : -0.1);
          }
          newVal = Math.max(88.1, Math.min(107.9, newVal));
          slider.value = Math.round(newVal * 10);
          onFrequencyChange(newVal);
        }
      });
    }

    // ---- Helpers ----

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // ---- Pre-fetch all station data ----
    async function prefetchAllStations() {
      await Promise.all(stations.map(async (s) => {
        try {
          const res = await fetch(`/api/station/${s.freq}`);
          stationData[s.freq] = await res.json();
        } catch (e) {}
      }));
      console.log(`Pre-fetched data for ${Object.keys(stationData).length} stations`);
    }

    // ---- Album art preloading ----
    // For every station, compute the UTC-scheduled current song and preload
    // its image plus previous and next songs' images into the browser cache.

    function preloadImage(url) {
      if (!url || preloadedImages[url]) return;
      const img = new Image();
      img.src = url;
      preloadedImages[url] = img;
    }

    function preloadAlbumArt() {
      for (const s of stations) {
        const data = stationData[s.freq];
        if (!data?.songs?.length) continue;

        const songs = data.songs;
        const { index } = getSchedule(songs);
        const len = songs.length;

        // Previous, current, next
        const prev = (index - 1 + len) % len;
        const next = (index + 1) % len;

        preloadImage(songs[prev].imageUrl);
        preloadImage(songs[index].imageUrl);
        preloadImage(songs[next].imageUrl);
      }
    }

    // ---- Boot ----

    function setupVolumeControls() {
      const slider = document.getElementById("vol-slider");
      slider.value = getSavedVolume();

      slider.addEventListener("input", e => {
        const val = parseFloat(e.target.value);
        if (masterGain) masterGain.gain.setTargetAtTime(volumeCurve(val), audioCtx.currentTime, 0.02);
        saveVolume(val);
      });

      document.getElementById("vol-btn").addEventListener("click", () => {
        if (!masterGain) return;
        if (masterGain.gain.value > 0.01) {
          masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
          slider.value = 0;
        } else {
          const restored = getSavedVolume();
          masterGain.gain.setTargetAtTime(volumeCurve(restored), audioCtx.currentTime, 0.02);
          slider.value = restored;
        }
      });
    }

    async function init() {
      renderLoading();
      const res = await fetch("/api/stations");
      stations = await res.json();
      drawDial();
      updateNeedlePosition();
      setupTunerInput();
      setupVolumeControls();

      // Show initial prompt
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex";
      overlay.innerHTML = `
        <div class="pick-station-icon">&#9685;</div>
        <div class="pick-station-text">Tune the dial to find a station</div>
        <div class="pick-station-sub">Drag the slider or use arrow keys</div>
      `;

      // Pre-fetch all station data, then preload album art for current schedule
      prefetchAllStations().then(() => {
        preloadAlbumArt();
        setInterval(preloadAlbumArt, 30_000);
      });

      window.addEventListener("resize", () => {
        drawDial();
        updateNeedlePosition();
      });

      connectWebSocket();
      twitchChat.init();
    }

    // ---- Chat-Triggered Visualizer Effects ----
    var chatEffects = (function() {
      var EFFECT_DURATION = 30000; // 30 seconds

      function resetColors() {
        if (visualizerFx.timer) {
          clearTimeout(visualizerFx.timer);
        }
        visualizerFx.colorMode = 'default';
        visualizerFx.intensity = 1.0;
        visualizerFx.glowMultiplier = 1.0;
        visualizerFx.rain = false;
        visualizerFx.hueOffset = 0;
        visualizerFx.timer = null;
      }

      function reset() {
        resetColors();
        visualizerFx.mode = 'bars';
        overlayEffects.length = 0;
      }

      function applyTimedEffect(fn) {
        resetColors();
        fn();
        visualizerFx.timer = setTimeout(resetColors, EFFECT_DURATION);
      }

      var effects = {
        disco: function() {
          applyTimedEffect(function() {
            visualizerFx.colorMode = 'disco';
          });
        },
        matrix: function() {
          applyTimedEffect(function() {
            visualizerFx.colorMode = 'matrix';
          });
        },
        vaporwave: function() {
          applyTimedEffect(function() {
            visualizerFx.colorMode = 'vaporwave';
          });
        },
        party: function() {
          applyTimedEffect(function() {
            visualizerFx.intensity = 1.3;
            visualizerFx.glowMultiplier = 2.0;
          });
        },
        chill: function() {
          applyTimedEffect(function() {
            visualizerFx.colorMode = 'chill';
            visualizerFx.intensity = 0.7;
          });
        },
        rain: function() {
          applyTimedEffect(function() {
            visualizerFx.rain = true;
          });
        },
        reset: function() {
          reset();
        },
        bars: function() {
          visualizerFx.mode = 'bars';
        },
        scope: function() {
          visualizerFx.mode = 'scope';
        },
        circle: function() {
          visualizerFx.mode = 'circle';
        },
        blocks: function() {
          visualizerFx.mode = 'blocks';
        },
        discoball: function() {
          createDiscoBall();
        },
        confetti: function() {
          createConfetti();
        },
        fire: function() {
          createFire();
        },
        snow: function() {
          createSnow();
        },
        earthquake: function() {
          createEarthquake();
        },
        nextchannel: function() {
          if (!stations.length) return;
          var idx = -1;
          for (var i = 0; i < stations.length; i++) {
            if (parseFloat(stations[i].freq) === currentFreq) { idx = i; break; }
          }
          var next = (idx + 1) % stations.length;
          var freq = parseFloat(stations[next].freq);
          var slider = document.getElementById('tuner-range');
          if (slider) slider.value = Math.round(freq * 10);
          onFrequencyChange(freq);
        },
        previouschannel: function() {
          if (!stations.length) return;
          var idx = -1;
          for (var i = 0; i < stations.length; i++) {
            if (parseFloat(stations[i].freq) === currentFreq) { idx = i; break; }
          }
          var prev = (idx - 1 + stations.length) % stations.length;
          var freq = parseFloat(stations[prev].freq);
          var slider = document.getElementById('tuner-range');
          if (slider) slider.value = Math.round(freq * 10);
          onFrequencyChange(freq);
        }
      };

      function trigger(commandName) {
        var cmd = commandName.toLowerCase();
        if (effects[cmd]) {
          effects[cmd]();
          return true;
        }
        return false;
      }

      function processMessage(text) {
        if (!text || text.charAt(0) !== '!') return false;
        var cmd = text.split(' ')[0].substring(1);
        return trigger(cmd);
      }

      return { trigger: trigger, reset: reset, processMessage: processMessage };
    })();

    // ---- Dev Menu ----
    (function() {
      var menu = document.getElementById('dev-menu');
      var timedFx = ['disco', 'matrix', 'vaporwave', 'party', 'chill', 'rain'];

      function updateHighlight() {
        var btns = menu.querySelectorAll('button[data-fx]');
        var modes = { bars: 1, scope: 1, circle: 1, blocks: 1 };
        var overlayIds = {};
        for (var oi = 0; oi < overlayEffects.length; oi++) overlayIds[overlayEffects[oi].id] = 1;
        for (var i = 0; i < btns.length; i++) {
          var fx = btns[i].getAttribute('data-fx');
          var active = false;
          if (fx === visualizerFx.colorMode && fx !== 'default') active = true;
          if (fx === 'party' && visualizerFx.intensity === 1.3) active = true;
          if (fx === 'rain' && visualizerFx.rain) active = true;
          if (modes[fx] && fx === visualizerFx.mode) active = true;
          if (overlayIds[fx]) active = true;
          btns[i].classList.toggle('active-fx', active);
        }
      }

      menu.addEventListener('click', function(e) {
        var btn = e.target.closest('button[data-fx]');
        if (!btn) return;
        chatEffects.trigger(btn.getAttribute('data-fx'));
        updateHighlight();
      });

      // Ctrl+Shift+D toggles the menu
      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.shiftKey && e.key === 'D') {
          e.preventDefault();
          menu.classList.toggle('visible');
        }
      });

      // ?dev=1 auto-opens
      try {
        if (new URLSearchParams(window.location.search).get('dev') === '1') {
          menu.classList.add('visible');
        }
      } catch (e) {}

      // Periodically sync highlight (effects auto-expire)
      setInterval(updateHighlight, 1000);
    })();

    // ---- Twitch Chat Integration ----
    var twitchChat = (function() {
      var TWITCH_IRC_URL = 'wss://irc-ws.chat.twitch.tv:443';
      var MAX_BUFFER = 100;
      var MAX_SIDEBAR_MSGS = 100;
      var MAX_TICKER_ITEMS = 30;
      var RECONNECT_DELAY = 5000;
      var MODES = ['off', 'sidebar', 'ticker'];

      var channel = null;
      var chatWs = null;
      var mode = 'off';
      var messageBuffer = [];
      var isConnected = false;
      var reconnectTimer = null;

      function getChannel() {
        try {
          return new URLSearchParams(window.location.search).get('channel');
        } catch (e) { return null; }
      }

      function hashColor(name) {
        var hash = 0;
        for (var i = 0; i < name.length; i++) {
          hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        return 'hsl(' + (Math.abs(hash) % 360) + ', 70%, 60%)';
      }

      function setStatus(status) {
        var dot = document.getElementById('chat-status-dot');
        if (!dot) return;
        dot.className = 'chat-status-dot';
        if (status) dot.classList.add(status);
      }

      function updateToggleUI() {
        var btn = document.getElementById('chat-toggle');
        var label = document.getElementById('chat-mode-label');
        if (!btn || !label) return;
        if (mode === 'off') {
          btn.classList.remove('active');
          label.textContent = '';
        } else {
          btn.classList.add('active');
          label.textContent = mode === 'sidebar' ? 'CHAT' : 'TICKER';
        }
      }

      function saveMode() {
        try { localStorage.setItem('sunotime-chat-mode', mode); } catch (e) {}
      }

      function loadMode() {
        try {
          var m = localStorage.getItem('sunotime-chat-mode');
          if (m && MODES.indexOf(m) !== -1) return m;
        } catch (e) {}
        return 'off';
      }

      function connect() {
        if (chatWs || !channel) return;
        setStatus('connecting');
        var nick = 'justinfan' + Math.floor(Math.random() * 99999);
        chatWs = new WebSocket(TWITCH_IRC_URL);

        chatWs.onopen = function() {
          chatWs.send('CAP REQ :twitch.tv/tags');
          chatWs.send('NICK ' + nick);
          chatWs.send('JOIN #' + channel);
          isConnected = true;
          setStatus('connected');
        };

        chatWs.onmessage = function(event) {
          var lines = event.data.split('\r\n');
          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];
            if (!line) continue;
            if (line === 'PING :tmi.twitch.tv') {
              chatWs.send('PONG :tmi.twitch.tv');
              continue;
            }
            var parsed = parseMessage(line);
            if (parsed) addMessage(parsed);
          }
        };

        chatWs.onclose = function() {
          chatWs = null;
          isConnected = false;
          if (mode !== 'off') {
            setStatus('error');
            reconnectTimer = setTimeout(function() {
              reconnectTimer = null;
              if (mode !== 'off') connect();
            }, RECONNECT_DELAY);
          }
        };

        chatWs.onerror = function() {
          if (chatWs) chatWs.close();
        };
      }

      function disconnect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (chatWs) {
          chatWs.close();
          chatWs = null;
        }
        isConnected = false;
        setStatus('');
      }

      function parseMessage(line) {
        var tags = {};
        var rest = line;

        if (rest.charAt(0) === '@') {
          var spaceIdx = rest.indexOf(' ');
          if (spaceIdx === -1) return null;
          var tagStr = rest.substring(1, spaceIdx);
          rest = rest.substring(spaceIdx + 1);
          var tagParts = tagStr.split(';');
          for (var i = 0; i < tagParts.length; i++) {
            var eq = tagParts[i].indexOf('=');
            if (eq !== -1) {
              tags[tagParts[i].substring(0, eq)] = tagParts[i].substring(eq + 1);
            }
          }
        }

        var privmsgIdx = rest.indexOf(' PRIVMSG ');
        if (privmsgIdx === -1) return null;

        var prefix = rest.substring(0, privmsgIdx);
        if (prefix.charAt(0) === ':') prefix = prefix.substring(1);
        var exclIdx = prefix.indexOf('!');
        var username = exclIdx !== -1 ? prefix.substring(0, exclIdx) : prefix;

        var afterPrivmsg = rest.substring(privmsgIdx + 9);
        var colonIdx = afterPrivmsg.indexOf(' :');
        var text = colonIdx !== -1 ? afterPrivmsg.substring(colonIdx + 2) : '';

        return {
          username: tags['display-name'] || username,
          color: tags['color'] || hashColor(username),
          text: text
        };
      }

      function addMessage(msg) {
        messageBuffer.push(msg);
        if (messageBuffer.length > MAX_BUFFER) messageBuffer.shift();

        chatEffects.processMessage(msg.text);

        if (mode === 'sidebar') appendSidebarMessage(msg);
        else if (mode === 'ticker') appendTickerItem(msg);
      }

      function appendSidebarMessage(msg) {
        var container = document.getElementById('chat-messages');
        if (!container) return;

        var atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

        var div = document.createElement('div');
        div.className = 'chat-msg';

        var userSpan = document.createElement('span');
        userSpan.className = 'chat-user';
        userSpan.style.color = msg.color;
        userSpan.textContent = msg.username + ':';

        var textSpan = document.createElement('span');
        textSpan.className = 'chat-text';
        textSpan.textContent = ' ' + msg.text;

        div.appendChild(userSpan);
        div.appendChild(textSpan);
        container.appendChild(div);

        while (container.children.length > MAX_SIDEBAR_MSGS) {
          container.removeChild(container.firstChild);
        }

        if (atBottom) container.scrollTop = container.scrollHeight;
      }

      function appendTickerItem(msg) {
        var track = document.getElementById('chat-ticker-track');
        if (!track) return;

        var item = document.createElement('span');
        item.className = 'chat-ticker-item';

        var userSpan = document.createElement('span');
        userSpan.className = 'chat-user';
        userSpan.style.color = msg.color;
        userSpan.textContent = msg.username;

        var textSpan = document.createElement('span');
        textSpan.className = 'chat-text';
        textSpan.textContent = msg.text;

        var sep = document.createElement('span');
        sep.className = 'ticker-sep';
        sep.textContent = '\u25CF';

        item.appendChild(userSpan);
        item.appendChild(textSpan);
        item.appendChild(sep);
        track.appendChild(item);

        while (track.children.length > MAX_TICKER_ITEMS) {
          track.removeChild(track.firstChild);
        }

        var totalWidth = track.scrollWidth + track.parentElement.offsetWidth;
        track.style.animationDuration = Math.max(10, totalWidth / 60) + 's';
      }

      function rebuildSidebar() {
        var container = document.getElementById('chat-messages');
        if (!container) return;
        container.innerHTML = '';
        for (var i = 0; i < messageBuffer.length; i++) {
          appendSidebarMessage(messageBuffer[i]);
        }
      }

      function rebuildTicker() {
        var track = document.getElementById('chat-ticker-track');
        if (!track) return;
        track.innerHTML = '';
        var start = Math.max(0, messageBuffer.length - MAX_TICKER_ITEMS);
        for (var i = start; i < messageBuffer.length; i++) {
          appendTickerItem(messageBuffer[i]);
        }
      }

      function showMode(newMode) {
        mode = newMode;
        saveMode();
        updateToggleUI();

        var sidebar = document.getElementById('chat-sidebar');
        var ticker = document.getElementById('chat-ticker');

        if (mode === 'off') {
          sidebar.classList.remove('visible');
          ticker.classList.remove('visible');
          disconnect();
        } else if (mode === 'sidebar') {
          sidebar.classList.add('visible');
          ticker.classList.remove('visible');
          rebuildSidebar();
          if (!isConnected) connect();
        } else if (mode === 'ticker') {
          sidebar.classList.remove('visible');
          ticker.classList.add('visible');
          rebuildTicker();
          if (!isConnected) connect();
        }
      }

      function cycleMode() {
        var idx = MODES.indexOf(mode);
        showMode(MODES[(idx + 1) % MODES.length]);
      }

      function init() {
        channel = getChannel();
        if (!channel) return;
        channel = channel.toLowerCase().replace(/^#/, '');

        var btn = document.getElementById('chat-toggle');
        if (btn) {
          btn.style.display = 'flex';
          btn.addEventListener('click', cycleMode);
        }

        var channelLabel = document.getElementById('chat-channel-name');
        if (channelLabel) channelLabel.textContent = '#' + channel;

        var savedMode = loadMode();
        if (savedMode !== 'off') showMode(savedMode);
      }

      return { init: init, parseMessage: parseMessage, hashColor: hashColor, _addMessage: addMessage };
    })();

    init();
  </script>
</body>
</html>
